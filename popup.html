<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 15px;
      font-family: -apple-system, sans-serif;
      background: #1e1e1e;
      color: white;
      margin: 0;
    }
    h3 { margin: 0 0 5px 0; font-size: 16px; }
    .site { font-size: 12px; color: #999; margin-bottom: 15px; word-break: break-all; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    /* Toggle Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #555;
      transition: .3s;
      border-radius: 26px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #4CAF50; }
    input:checked + .slider:before { transform: translateX(24px); }
  </style>
</head>
<body>
  <h3>🌙 Dark Mode</h3>
  <div class="site" id="siteName">Loading...</div>
  <div class="row">
    <span>Enable for this site</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
